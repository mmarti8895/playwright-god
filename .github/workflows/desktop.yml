name: Desktop CI

on:
  pull_request:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"

jobs:
  build:
    name: ${{ matrix.os }} build + test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Install Linux dependencies (Tauri 2)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Frontend tests (vitest)
        run: npm test

      - name: Frontend build (vite + tsc)
        run: npm run build

      - name: Backend tests (cargo test)
        working-directory: desktop/src-tauri
        run: cargo test --lib

      - name: Tauri debug build
        run: npm run tauri build -- --debug
        env:
          # Skip code-signing on CI; the artifact is for smoke-test only.
          CI: "true"
