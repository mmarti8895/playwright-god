name: Desktop release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }} bundle
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "desktop/src-tauri/target/release/bundle/dmg/*.dmg"
          - os: ubuntu-latest
            artifact_glob: |
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-desktop-

      - name: Install Linux dependencies (Tauri 2)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Tauri release build
        working-directory: desktop
        run: npm run tauri build
        env:
          CI: "true"

      - name: Upload artifacts to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ matrix.artifact_glob }}
